<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APAC CAN Trivia Slideshow</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@300;400;600;700&family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    background: #000;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed; width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 50%; pointer-events: none;
    z-index: 9999; transform: translate(-50%,-50%);
    transition: transform 0.1s, border-color 0.2s;
  }

  /* ── Slide container ── */
  .slides-wrap {
    width: 100%; height: 100%;
    position: relative;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s ease;
    overflow: hidden;
    padding: 60px;
  }
  .slide.active {
    opacity: 1; pointer-events: all;
  }

  /* ── Shared type ── */
  .slide-number {
    position: absolute; top: 32px; right: 44px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px;
    opacity: 0.5;
  }
  .slide-tag {
    position: absolute; top: 32px; left: 44px;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    opacity: 0.6; font-weight: 600;
  }
  .can-tag {
    position: absolute; bottom: 32px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    opacity: 0.55; font-weight: 600;
    border: 1px solid currentColor; padding: 5px 16px; border-radius: 20px;
  }
  .emoji-big {
    font-size: clamp(60px, 10vw, 120px);
    line-height: 1; margin-bottom: 28px;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.3));
    animation: floatEmoji 4s ease-in-out infinite;
  }
  @keyframes floatEmoji {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .fact-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 3.2vw, 44px);
    font-weight: 900; line-height: 1.2;
    text-align: center; max-width: 920px;
    position: relative; z-index: 2;
  }
  .fact-text em { font-style: italic; }
  .fact-text mark {
    background: none;
    -webkit-text-stroke: 1px currentColor;
    color: transparent;
    font-style: italic;
  }
  .sub-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(14px, 1.5vw, 19px);
    font-weight: 300; letter-spacing: 1px;
    text-align: center; max-width: 750px;
    margin-top: 20px; opacity: 0.75;
    line-height: 1.6;
    position: relative; z-index: 2;
  }

  /* ── Decorative shapes ── */
  .deco {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.35;
    pointer-events: none;
  }

  /* ── Navigation ── */
  .nav {
    position: fixed; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 100;
    align-items: center;
    max-width: 90vw; flex-wrap: wrap; justify-content: center;
  }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.3); cursor: pointer;
    transition: all 0.3s; border: none;
  }
  .nav-dot.active { background: #fff; transform: scale(1.5); }
  .nav-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 44px; height: 44px; border-radius: 50%;
    font-size: 18px; cursor: pointer; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; backdrop-filter: blur(4px);
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.25); }
  .nav-prev { left: 20px; }
  .nav-next { right: 20px; }

  /* Progress bar */
  .progress {
    position: fixed; top: 0; left: 0; height: 3px;
    background: rgba(255,255,255,0.8);
    transition: width 0.6s ease; z-index: 200;
  }

  /* ── AUTO-PLAY indicator ── */
  .autoplay-ring {
    position: fixed; bottom: 30px; right: 36px;
    width: 36px; height: 36px; z-index: 200; cursor: pointer;
  }
  .autoplay-ring svg { width: 36px; height: 36px; transform: rotate(-90deg); }
  .autoplay-ring circle.track { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 2.5; }
  .autoplay-ring circle.fill {
    fill: none; stroke: rgba(255,255,255,0.7); stroke-width: 2.5;
    stroke-dasharray: 100; stroke-dashoffset: 100;
    transition: stroke-dashoffset 0.1s linear;
  }
  .autoplay-ring .pause-icon {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 700;
  }

  /* Slide Themes mapped by index dynamically in script or using modular IDs */
  .theme-1 { background: linear-gradient(135deg, #1a0a00 0%, #6b2800 50%, #c45200 100%); color: #FFF3E0; }
  .theme-2 { background: linear-gradient(160deg, #0d1b4
